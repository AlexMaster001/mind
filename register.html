<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Регистрация</h1>
            <p>Создайте личный кабинет для сохранения результатов тестов</p>
        </section>

        <section class="card">
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="name">Имя *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        Согласен с политикой конфиденциальности
                    </label>
                </div>
                <button type="submit" class="button w-100">Зарегистрироваться</button>
                <p class="text-center mt-3">Уже есть аккаунт? <a href="/login.html">Войти</a></p>
            </form>
        </section>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        auth.createUserWithEmailAndPassword(email, password)
          .then(userCredential => {
            return db.collection('users').doc(userCredential.user.uid).set({
              name: name,
              email: email,
              role: 'user', // ← БЫЛО 'client', ТЕПЕРЬ 'user'
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          })
          .then(() => {
            alert('Регистрация успешна!');
            setTimeout(() => {
              window.location.href = '/profile.html';
            }, 500);
          })
          .catch(err => {
            let msg = err.message;
            if (msg.includes('email-already-in-use')) msg = 'Email уже зарегистрирован';
            if (msg.includes('weak-password')) msg = 'Пароль слишком слабый';
            alert('Ошибка: ' + msg);
          });
      });
    </script>
</body>
</html>
