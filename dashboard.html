<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | MindMender Therapy Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body class="bg-indigo-50">
    <custom-navbar></custom-navbar>

    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar -->
            <div class="lg:w-1/4 bg-white rounded-xl shadow-lg p-6 h-fit">
                <div class="text-center mb-6">
                    <div class="w-24 h-24 rounded-full bg-indigo-100 mx-auto mb-4 overflow-hidden">
                        <img src="https://huggingface.co/spaces/Alex01010101010/mindmender-therapy-hub/resolve/main/images/Аватар.jpg" alt="Пользователь" class="w-full h-full object-cover" style="object-position: center 30%;">
</div>
                    <h2 class="text-xl font-bold text-indigo-900" id="userName">Иван Иванов</h2>
                    <p class="text-gray-600 text-sm">Пользователь</p>
                </div>

                <nav class="space-y-2">
                    <a href="#profile" class="flex items-center px-4 py-2 text-indigo-600 bg-indigo-50 rounded-lg">
                        <i data-feather="user" class="mr-3"></i> Профиль
                    </a>
                    <a href="#appointments" class="flex items-center px-4 py-2 text-gray-600 hover:bg-indigo-50 rounded-lg">
                        <i data-feather="calendar" class="mr-3"></i> Мои записи
                    </a>
                    <a href="#notifications" class="flex items-center px-4 py-2 text-gray-600 hover:bg-indigo-50 rounded-lg">
                        <i data-feather="bell" class="mr-3"></i> Уведомления
                    </a>
                    <a href="#settings" class="flex items-center px-4 py-2 text-gray-600 hover:bg-indigo-50 rounded-lg">
                        <i data-feather="settings" class="mr-3"></i> Настройки
                    </a>
                    <a href="/login.html" class="flex items-center px-4 py-2 text-gray-600 hover:bg-indigo-50 rounded-lg">
                        <i data-feather="log-out" class="mr-3"></i> Выйти
                    </a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="lg:w-3/4">
                <!-- Profile Section -->
                <div id="profile" class="bg-white rounded-xl shadow-lg p-6 mb-8">
                    <h2 class="text-2xl font-bold text-indigo-900 mb-6">Мой профиль</h2>
                    
                    <form class="space-y-4">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-gray-700 mb-2">ФИО</label>
                                <input type="text" value="Иван Иванов" class="w-full px-4 py-2 border rounded-lg bg-gray-50" disabled>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">Email</label>
                                <input type="email" value="user@example.com" class="w-full px-4 py-2 border rounded-lg bg-gray-50" disabled>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 mb-2">Телефон</label>
                            <input type="tel" value="+7 (999) 123-45-67" class="w-full px-4 py-2 border rounded-lg">
                        </div>
                        
                        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition duration-300">
                            Сохранить изменения
                        </button>
                    </form>
                </div>

                <!-- Appointments Section -->
                <div id="appointments" class="bg-white rounded-xl shadow-lg p-6 mb-8">
                    <h2 class="text-2xl font-bold text-indigo-900 mb-6">Мои записи</h2>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead>
                                <tr class="bg-indigo-50">
                                    <th class="px-6 py-3 text-left text-xs font-medium text-indigo-900 uppercase">Дата</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-indigo-900 uppercase">Время</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-indigo-900 uppercase">Услуга</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-indigo-900 uppercase">Статус</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap">15.06.2023</td>
                                    <td class="px-6 py-4 whitespace-nowrap">16:00</td>
                                    <td class="px-6 py-4 whitespace-nowrap">Индивидуальная консультация</td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">Подтверждена</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap">20.06.2023</td>
                                    <td class="px-6 py-4 whitespace-nowrap">18:00</td>
                                    <td class="px-6 py-4 whitespace-nowrap">Тренинг по управлению стрессом</td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-800">Ожидает подтверждения</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <custom-footer></custom-footer>
    
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="script.js"></script>
</body>
</html>
