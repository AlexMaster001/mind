<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .profile-actions { text-align: center; margin-top: 2rem; }
      .profile-actions .button {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        margin: 0 0.5rem 0.5rem 0;
        border-radius: 8px;
        text-decoration: none;
      }
      .outline {
        background: transparent;
        border: 2px solid #C77966;
        color: #C77966;
      }
      .outline:hover {
        background-color: rgba(199, 121, 102, 0.05);
      }
      #testHistory, #childrenSection, #observationsSection {
        margin-top: 2rem;
      }
      .observation-item {
        background: #f9f9f9;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        border-left: 3px solid var(--accent-color);
      }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Личный кабинет</h1>
            <p>Ваши данные и история тестов</p>
        </section>

        <section class="card" id="userInfo">
            <p>Загрузка...</p>
        </section>

        <div class="profile-actions">
            <a href="/tests/tests.html" class="button outline">Пройти тесты</a>
            <a href="/parents.html" class="button outline">Для родителей</a>
            <button onclick="logout()" class="button">Выйти</button>
        </div>

        <!-- Дети -->
        <div id="childrenSection" style="display:none;">
            <h3>Мои дети</h3>
            <ul id="childrenList" style="list-style: none; padding: 0;"></ul>
        </div>

        <!-- Наблюдения -->
        <div id="observationsSection" style="display:none;">
            <h3>Психолого-педагогические наблюдения</h3>
            <div id="observationsList"></div>
        </div>

        <!-- История тестов -->
        <div id="testHistory">
            <h3>Загрузка истории...</h3>
        </div>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const auth = firebase.auth();
      const db = firebase.firestore();

      function logout() {
        auth.signOut().then(() => {
          window.location.href = '/';
        });
      }

      auth.onAuthStateChanged(async (user) => {
        const userInfoDiv = document.getElementById('userInfo');
        const childrenSection = document.getElementById('childrenSection');
        const observationsSection = document.getElementById('observationsSection');

        if (!user) {
          userInfoDiv.innerHTML = '<p>Вы не авторизованы.</p>';
          setTimeout(() => window.location.href = '/login.html', 2000);
          return;
        }

        try {
          // Загружаем профиль
          const doc = await db.collection('users').doc(user.uid).get();
          const data = doc.exists ? doc.data() : { name: '—', email: user.email, role: 'user' };
          userInfoDiv.innerHTML = `
            <h3>Профиль</h3>
            <p><strong>Имя:</strong> ${data.name}</p>
            <p><strong>Email:</strong> ${data.email}</p>
            <p><strong>Телефон:</strong> ${data.phone || 'Не указан'}</p>
            <p><strong>Роль:</strong> ${data.role}</p>
          `;

          // Загружаем детей
          if (data.children && data.children.length > 0) {
            const childrenList = document.getElementById('childrenList');
            childrenList.innerHTML = '';
            data.children.forEach(child => {
              const li = document.createElement('li');
              li.style.marginBottom = '0.5rem';
              li.textContent = `${child.childName}, ${child.age} лет`;
              childrenList.appendChild(li);
            });
            childrenSection.style.display = 'block';
          }

          // Загружаем наблюдения
          const obsSnapshot = await db
            .collection('observations')
            .where('parentId', '==', user.uid)
            .orderBy('date', 'desc')
            .get();

          if (!obsSnapshot.empty) {
            const obsList = document.getElementById('observationsList');
            obsList.innerHTML = '';
            obsSnapshot.forEach(doc => {
              const d = doc.data();
              let date = '—';
              if (d.date && d.date.toDate) {
                date = d.date.toDate().toLocaleDateString('ru-RU');
              }
              const div = document.createElement('div');
              div.className = 'observation-item';
              div.innerHTML = `
                <p><strong>Ребёнок:</strong> ${d.childName}</p>
                <p><em>${d.text}</em></p>
                <p style="font-size:0.85rem;color:#777;">${date} • ${d.author || 'Администратор'}</p>
              `;
              obsList.appendChild(div);
            });
            observationsSection.style.display = 'block';
          }

          // Загружаем историю тестов
          const testSnapshot = await db
            .collection('users')
            .doc(user.uid)
            .collection('testResults')
            .orderBy('date', 'desc')
            .get();

          const historyDiv = document.getElementById('testHistory');
          if (testSnapshot.empty) {
            historyDiv.innerHTML = '<h3>История тестов</h3><p>Вы ещё не проходили тесты.</p>';
            return;
          }

          let html = '<h3>История тестов</h3><ul>';
          testSnapshot.forEach(doc => {
            const d = doc.data();
            let date = '—';
            if (d.date && d.date.toDate) {
              date = d.date.toDate().toLocaleDateString('ru-RU');
            }
            html += `<li>
              <strong>${d.testName}</strong> — ${d.score}/${d.maxScore} (${d.interpretation}) от ${date}
              <a href="/tests/tests.html" class="button outline ml-2" style="font-size:0.8rem;padding:0.3rem 0.6rem;">Перепройти</a>
            </li>`;
          });
          html += '</ul>';
          historyDiv.innerHTML = html;

        } catch (err) {
          console.error('Ошибка загрузки:', err);
          userInfoDiv.innerHTML = `<p>Ошибка: ${err.message}</p>`;
        }
      });
    </script>
</body>
</html>
