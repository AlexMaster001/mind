<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Личный кабинет</h1>
            <p>Ваши данные и история тестов</p>
        </section>

        <section class="card" id="userInfo">
            <p>Загрузка...</p>
        </section>

        <div class="text-center mt-4">
            <button onclick="logout()" class="button">Выйти</button>
        </div>
    </main>

    <custom-footer></custom-footer>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      function logout() {
        auth.signOut().then(() => {
          localStorage.removeItem('uid');
          alert('Вы вышли из аккаунта');
          window.location.href = '/';
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        const uid = localStorage.getItem('uid');
        if (!uid) {
          alert('Сессия истекла. Пожалуйста, войдите снова.');
          window.location.href = '/login.html';
          return;
        }

        db.collection('users').doc(uid).get()
          .then(doc => {
            if (!doc.exists) {
              document.getElementById('userInfo').innerHTML = '<p>Пользователь не найден.</p>';
              return;
            }

            const data = doc.data();
            document.getElementById('userInfo').innerHTML = `
              <h3>Профиль</h3>
              <p><strong>Имя:</strong> ${data.name || 'Не указано'}</p>
              <p><strong>Email:</strong> ${data.email}</p>
              <p><strong>Роль:</strong> ${data.role || 'client'}</p>
              <p><strong>Дата регистрации:</strong> ${data.createdAt?.toDate?.().toLocaleDateString() || '—'}</p>
              <p><strong>Телефон:</strong> ${data.phone || 'Не указан'}</p>
              <hr>
              <p><em>Данные хранятся в облачной базе Firebase. Вы можете удалить аккаунт в любое время.</em></p>
            `;
          })
          .catch(err => {
            console.error("Ошибка загрузки профиля:", err);
            document.getElementById('userInfo').innerHTML = `<p>Ошибка загрузки: ${err.message}</p>`;
          });
      });
    </script>
</body>
</html>
