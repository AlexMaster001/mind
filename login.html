<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Вход в личный кабинет</h1>
            <p>Войдите, чтобы получить доступ к истории тестов и персональным рекомендациям</p>
        </section>

        <section class="card login-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="button w-100">Войти</button>
                <p class="text-center mt-3">
                    Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
                </p>
            </form>
        </section>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        auth.signInWithEmailAndPassword(email, password)
          .then(userCredential => {
            const user = userCredential.user;
            return db.collection('users').doc(user.uid).get().then(doc => {
              if (!doc.exists) {
                return db.collection('users').doc(user.uid).set({
                  email: email,
                  name: email.split('@')[0],
                  role: 'client',
                  createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
              }
            });
          })
          .then(() => {
            alert('Вход выполнен успешно!');
            setTimeout(() => {
              window.location.href = '/profile.html';
            }, 500);
          })
          .catch(err => {
            let msg = err.message;
            if (msg.includes('invalid-email')) msg = 'Неверный email';
            if (msg.includes('wrong-password')) msg = 'Неверный пароль';
            alert('Ошибка: ' + msg);
          });
      });
    </script>
</body>
</html>
