<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <custom-navbar></custom-navbar>
    
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Вход в личный кабинет</h1>
            <p>Войдите, чтобы получить доступ к истории тестов и персональным рекомендациям</p>
        </section>

        <section class="card login-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.ru">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        Запомнить меня
                    </label>
                </div>
                
                <button type="submit" class="button w-100">
                    Войти
                </button>
                
                <div class="text-center mt-3">
                    <p class="mb-2">
                        Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
                    </p>
                    <p>
                        <a href="/forgot-password.html">Забыли пароль?</a>
                    </p>
                </div>
                
                <!-- Демо-аккаунты для тестирования -->
                <div class="demo-accounts">
                    <p class="mb-1">
                        <strong>Демо-аккаунты для тестирования:</strong>
                    </p>
                    <p class="mb-1">
                        Пользователь: user@test.ru / пароль: 123456
                    </p>
                    <p>
                        Администратор: admin@test.ru / пароль: 123456
                    </p>
                </div>
            </form>
        </section>
    </main>

    <custom-footer></custom-footer>
    
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Демо-логика для тестирования
            let user;
            
            if (email === 'admin@test.ru' && password === '123456') {
                user = {
                    name: 'Алексей Кирсанов',
                    email: email,
                    role: 'admin',
                    phone: '+7 (999) 123-45-67'
                };
            } else if (email === 'user@test.ru' && password === '123456') {
                user = {
                    name: 'Иван Петров',
                    email: email,
                    role: 'user',
                    phone: '+7 (999) 987-65-43'
                };
            } else {
                // В реальном проекте здесь будет проверка на сервере
                // Для демо - создаем нового пользователя
                user = {
                    name: email.split('@')[0],
                    email: email,
                    role: 'user',
                    phone: ''
                };
            }
            
            // Сохраняем в localStorage
            localStorage.setItem('user', JSON.stringify(user));
            localStorage.setItem('isLoggedIn', 'true');
            
            // Если выбрано "запомнить меня"
            if (document.getElementById('remember').checked) {
                localStorage.setItem('remember', 'true');
            }
            
            alert('Вход успешен!');
            window.location.href = '/profile.html';
        });
        
        // Автозаполнение для демо
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const demo = urlParams.get('demo');
            
            if (demo === 'user') {
                document.getElementById('email').value = 'user@test.ru';
                document.getElementById('password').value = '123456';
            } else if (demo === 'admin') {
                document.getElementById('email').value = 'admin@test.ru';
                document.getElementById('password').value = '123456';
            }
        });
    </script>
</body>
</html>
