<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK (без пробелов!) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Админ-панель</h1>
            <p>Управление пользователями и наблюдениями</p>
        </section>

        <div id="adminContent">
            <div class="card text-center" style="padding: 3rem;">
                <h3>Загрузка...</h3>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const auth = firebase.auth();
      const db = firebase.firestore();

      // Форматирование даты
      function formatDate(timestamp) {
        if (!timestamp || !timestamp.toDate) return '—';
        return timestamp.toDate().toLocaleDateString('ru-RU');
      }

      auth.onAuthStateChanged(async (user) => {
        const adminContent = document.getElementById('adminContent');

        if (!user) {
          adminContent.innerHTML = `
            <div class="card text-center" style="padding: 3rem;">
              <h3>Войдите как администратор</h3>
              <a href="/login.html" class="button">Вход</a>
            </div>
          `;
          return;
        }

        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          if (!userDoc.exists || userDoc.data().role !== 'admin') {
            adminContent.innerHTML = `
              <div class="card text-center" style="padding: 3rem;">
                <h3>Доступ запрещён</h3>
                <p>Только для администраторов</p>
                <a href="/" class="button">На главную</a>
              </div>
            `;
            return;
          }

          // Загружаем все наблюдения
          const obsSnapshot = await db.collection('observations').orderBy('date', 'desc').get();
          const observations = [];
          obsSnapshot.forEach(doc => {
            observations.push({ id: doc.id, ...doc.data() });
          });

          if (observations.length === 0) {
            adminContent.innerHTML = `
              <div class="card">
                <h3>Нет наблюдений</h3>
                <p>Пока не создано ни одного наблюдения.</p>
              </div>
            `;
            return;
          }

          // Рендерим таблицу наблюдений
          let tableHtml = `
            <div class="card">
              <h3>📋 Психолого-педагогические наблюдения (${observations.length})</h3>
              <table class="w-100">
                <thead>
                  <tr style="background:#f5f5f5;">
                    <th>Ребёнок</th>
                    <th>Родитель</th>
                    <th>Дата</th>
                    <th>Текст</th>
                    <th>Действия</th>
                  </tr>
                </thead>
                <tbody id="observationsTableBody"></tbody>
              </table>
            </div>
          `;
          adminContent.innerHTML = tableHtml;

          const tbody = document.getElementById('observationsTableBody');
          observations.forEach(obs => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${obs.childName || '—'}</td>
              <td>${obs.parentId || '—'}</td>
              <td>${formatDate(obs.date)}</td>
              <td><div style="max-width:300px;word-wrap:break-word;">${obs.text || ''}</div></td>
              <td>
                <button class="button outline small edit-btn" data-id="${obs.id}" data-text="${obs.text}" data-child="${obs.childName}" data-parent="${obs.parentId}">
                  ✏️ Редактировать
                </button>
                <button class="button outline small delete-btn" data-id="${obs.id}" style="background:#ff6b6b;color:white;margin-top:0.3rem;">
                  🗑️ Удалить
                </button>
              </td>
            `;
            tbody.appendChild(row);
          });

          // Обработчики кнопок
          document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const id = this.getAttribute('data-id');
              const text = this.getAttribute('data-text');
              const childName = this.getAttribute('data-child');
              const parentId = this.getAttribute('data-parent');
              showEditModal(id, text, childName, parentId);
            });
          });

          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
              const id = this.getAttribute('data-id');
              if (confirm('Вы уверены, что хотите удалить это наблюдение?')) {
                try {
                  await db.collection('observations').doc(id).delete();
                  alert('✅ Наблюдение удалено');
                  location.reload();
                } catch (err) {
                  alert('Ошибка удаления: ' + err.message);
                }
              }
            });
          });

        } catch (err) {
          console.error('Ошибка:', err);
          adminContent.innerHTML = `<div class="card text-center"><p>Ошибка: ${err.message}</p></div>`;
        }
      });

      // Модальное окно редактирования
      function showEditModal(id, currentText, childName, parentId) {
        const modalHTML = `
          <div id="editModal" style="display:block; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
            <div style="background:white; margin:50px auto; padding:2rem; max-width:600px; border-radius:12px;">
              <h3>Редактировать наблюдение</h3>
              <form id="editForm">
                <div class="form-group">
                  <label>Ребёнок</label>
                  <input type="text" id="editChild" value="${childName}" disabled style="background:#f5f5f5;">
                </div>
                <div class="form-group">
                  <label>Текст наблюдения *</label>
                  <textarea id="editText" rows="6" required>${currentText}</textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="button">Сохранить</button>
                  <button type="button" class="secondary-button ml-2" onclick="closeEditModal()">Отмена</button>
                </div>
              </form>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);

        document.getElementById('editForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newText = document.getElementById('editText').value.trim();
          if (!newText) return;

          try {
            await db.collection('observations').doc(id).update({
              text: newText,
              date: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('✅ Наблюдение обновлено');
            closeEditModal();
            location.reload();
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        });
      }

      window.closeEditModal = function() {
        const modal = document.getElementById('editModal');
        if (modal) modal.remove();
      };
    </script>

    <style>
      .small {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
        margin: 0.2rem 0;
      }
      @media (max-width: 768px) {
        table, thead, tbody, th, td, tr {
          display: block;
        }
        td {
          text-align: right;
          padding-left: 50% !important;
          position: relative;
        }
        td:before {
          content: attr(data-label);
          position: absolute;
          left: 6px;
          width: 45%;
          padding-right: 10px;
          white-space: nowrap;
          font-weight: bold;
        }
      }
    </style>
</body>
</html>
