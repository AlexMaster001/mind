<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <custom-navbar></custom-navbar>
    
    <!-- Spacer для фиксированной навигации -->
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Админ-панель</h1>
            <p>Управление контентом и пользователями</p>
        </section>

        <div id="adminContent">
            <!-- Контент будет загружен через JavaScript -->
            <div class="card text-center" style="padding: 3rem;">
                <h3>Проверка доступа...</h3>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const adminContent = document.getElementById('adminContent');
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!isLoggedIn || !user.name || user.role !== 'admin') {
                adminContent.innerHTML = `
                    <div class="card text-center" style="padding: 3rem;">
                        <h3>Доступ запрещен</h3>
                        <p>У вас нет прав для доступа к админ-панели.</p>
                        <a href="/" class="button">На главную</a>
                    </div>
                `;
                return;
            }
            
            // Демо-статистика
            const stats = {
                totalUsers: 42,
                totalTests: 156,
                activeToday: 8,
                averageScore: 68
            };
            
            // Демо-пользователи
            const users = [
                { id: 1, name: 'Иван Петров', email: 'ivan@test.ru', role: 'user', tests: 5, lastActive: '2024-01-15' },
                { id: 2, name: 'Мария Сидорова', email: 'maria@test.ru', role: 'user', tests: 3, lastActive: '2024-01-14' },
                { id: 3, name: 'Алексей Кирсанов', email: 'alexey@test.ru', role: 'admin', tests: 12, lastActive: '2024-01-15' },
                { id: 4, name: 'Екатерина Волкова', email: 'ekaterina@test.ru', role: 'parent', tests: 2, lastActive: '2024-01-13' }
            ];
            
            adminContent.innerHTML = `
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3>📊 Статистика</h3>
                        <p><strong>Всего пользователей:</strong> ${stats.totalUsers}</p>
                        <p><strong>Всего тестов пройдено:</strong> ${stats.totalTests}</p>
                        <p><strong>Активных сегодня:</strong> ${stats.activeToday}</p>
                        <p><strong>Средний балл:</strong> ${stats.averageScore}%</p>
                    </div>
                    
                    <div class="admin-card">
                        <h3>🚀 Быстрые действия</h3>
                        <button class="button w-100 mb-2" onclick="alert('Функция в разработке')">
                            Добавить новый тест
                        </button>
                        <button class="secondary-button w-100 mb-2" onclick="alert('Функция в разработке')">
                            Редактировать материалы
                        </button>
                        <button class="secondary-button w-100" onclick="alert('Функция в разработке')">
                            Отправить рассылку
                        </button>
                    </div>
                    
                    <div class="admin-card">
                        <h3>🔔 Последние действия</h3>
                        <ul style="padding-left: 1.5rem;">
                            <li>Иван Петров прошел тест на тревожность (5 мин назад)</li>
                            <li>Новый пользователь зарегистрирован (1 час назад)</li>
                            <li>Мария Сидорова записалась в кружок (2 часа назад)</li>
                            <li>Обновлены материалы для родителей (вчера)</li>
                        </ul>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <h3>👥 Управление пользователями</h3>
                    <table class="w-100">
                        <thead>
                            <tr style="background: #f5f5f5;">
                                <th style="padding: 0.75rem; text-align: left;">Имя</th>
                                <th style="padding: 0.75rem; text-align: left;">Email</th>
                                <th style="padding: 0.75rem; text-align: left;">Роль</th>
                                <th style="padding: 0.75rem; text-align: left;">Тестов</th>
                                <th style="padding: 0.75rem; text-align: left;">Последняя активность</th>
                                <th style="padding: 0.75rem; text-align: left;">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 0.75rem;">${user.name}</td>
                                    <td style="padding: 0.75rem;">${user.email}</td>
                                    <td style="padding: 0.75rem;">
                                        <select class="w-100" style="padding: 0.25rem 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
                                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>Пользователь</option>
                                            <option value="parent" ${user.role === 'parent' ? 'selected' : ''}>Родитель</option>
                                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Администратор</option>
                                        </select>
                                    </td>
                                    <td style="padding: 0.75rem;">${user.tests}</td>
                                    <td style="padding: 0.75rem;">${user.lastActive}</td>
                                    <td style="padding: 0.75rem;">
                                        <button class="auth-link" onclick="alert('Редактирование ${user.name}')">
                                            Редактировать
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <div class="card mt-4">
                    <h3>⚙️ Настройки системы</h3>
                    <form id="systemSettings" class="register-form">
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" checked>
                                Разрешить регистрацию новых пользователей
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" checked>
                                Отправлять email-уведомления
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox">
                                Требовать подтверждение email
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label for="siteTitle">Название сайта</label>
                            <input type="text" id="siteTitle" value="Тихая поддержка">
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="button">Сохранить настройки</button>
                        </div>
                    </form>
                </div>
            `;
            
            // Обработчик формы настроек
            document.getElementById('systemSettings')?.addEventListener('submit', function(e) {
                e.preventDefault();
                alert('Настройки сохранены (в демо-версии изменения не применяются)');
            });
        });
    </script>
</body>
</html>
