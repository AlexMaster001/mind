<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Админ-панель</h1>
            <p>Управление наблюдениями и пользователями</p>
        </section>

        <div id="adminContent">
            <div class="card text-center" style="padding: 3rem;">
                <h3>Загрузка...</h3>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
        authDomain: "minde-31a83.firebaseapp.com",
        projectId: "minde-31a83",
        storageBucket: "minde-31a83.appspot.com",
        messagingSenderId: "1003108983817",
        appId: "1:1003108983817:web:494ede688023c73667c4d8"
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      const auth = firebase.auth();
      const db = firebase.firestore();

      function formatDate(timestamp) {
        if (!timestamp || !timestamp.toDate) return '—';
        return timestamp.toDate().toLocaleDateString('ru-RU');
      }

      // Основная логика
      auth.onAuthStateChanged(async (user) => {
        const adminContent = document.getElementById('adminContent');

        if (!user) {
          adminContent.innerHTML = `
            <div class="card text-center" style="padding: 3rem;">
              <h3>Войдите как администратор</h3>
              <a href="/login.html" class="button">Вход</a>
            </div>
          `;
          return;
        }

        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          if (!userDoc.exists || userDoc.data().role !== 'admin') {
            adminContent.innerHTML = `
              <div class="card text-center" style="padding: 3rem;">
                <h3>Доступ запрещён</h3>
                <p>Только для администраторов</p>
                <a href="/" class="button">На главную</a>
              </div>
            `;
            return;
          }

          // Загружаем всех пользователей
          const usersSnapshot = await db.collection('users').get();
          const parentNames = {};
          usersSnapshot.forEach(doc => {
            const data = doc.data();
            parentNames[doc.id] = `${data.name || '—'} (${data.email?.split('@')[0] || ''})`;
          });

          // === НАБЛЮДЕНИЯ ===
          const obsSnapshot = await db.collection('observations').orderBy('date', 'desc').get();
          const observations = [];
          obsSnapshot.forEach(doc => {
            observations.push({ id: doc.id, ...doc.data() });
          });

          let html = `
            <div class="card">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>📋 Психолого-педагогические наблюдения</h3>
                <button id="newObsBtn" class="button">+ Новое наблюдение</button>
              </div>
              <div id="observationsList" style="display: flex; flex-direction: column; gap: 1.2rem;"></div>
              ${observations.length === 0 ? '<p>Нет созданных наблюдений.</p>' : ''}
            </div>
          `;

          // === ДОБАВЛЕНИЕ РЕБЁНКА ===
          let parentOptions = '';
          Object.entries(parentNames).forEach(([uid, name]) => {
            parentOptions += `<option value="${uid}">${name}</option>`;
          });

          html += `
            <div class="card" style="margin-top: 2rem;">
              <h3>👶 Добавить ребёнка пользователю</h3>
              <form id="addChildForm">
                <div class="form-group">
                  <label for="parentId">Родитель:</label>
                  <select id="parentId" required>
                    <option value="">— Выберите —</option>
                    ${parentOptions}
                  </select>
                </div>
                <div class="form-group">
                  <label for="childName">Имя ребёнка:</label>
                  <input type="text" id="childName" required minlength="2" maxlength="50" placeholder="Например, Мария">
                </div>
                <div class="form-group">
                  <label for="childAge">Возраст (3–12 лет):</label>
                  <input type="number" id="childAge" min="3" max="12" required>
                </div>
                <button type="submit" class="button">Добавить ребёнка</button>
              </form>
              <div id="addChildMessage" style="margin-top: 10px; color: green; font-weight: bold;"></div>
            </div>
          `;

          adminContent.innerHTML = html;

          // === РЕНДЕР НАБЛЮДЕНИЙ ===
          const listEl = document.getElementById('observationsList');
          observations.forEach(obs => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.padding = '1rem';
            card.innerHTML = `
              <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;">
                <div>
                  <strong>${obs.childName || '—'}</strong><br>
                  <small>Родитель: ${parentNames[obs.parentId] || obs.parentId}</small><br>
                  <small>Дата: ${formatDate(obs.date)}</small>
                </div>
                <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
                  <button class="button outline small edit-btn" data-id="${obs.id}" data-text="${obs.text}" data-child="${obs.childName}" data-parent="${obs.parentId}">✏️</button>
                  <button class="button outline small delete-btn" data-id="${obs.id}" style="background:#ff6b6b;color:white;">🗑️</button>
                </div>
              </div>
              <div style="margin-top: 0.8rem; font-size: 0.95rem; color: #555; line-height: 1.4;">
                ${obs.text}
              </div>
            `;
            listEl.appendChild(card);
          });

          // === ОБРАБОТЧИКИ ===
          document.getElementById('newObsBtn').addEventListener('click', () => {
            showCreateModal(parentNames);
          });

          document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const id = this.getAttribute('data-id');
              const text = this.getAttribute('data-text');
              const childName = this.getAttribute('data-child');
              const parentId = this.getAttribute('data-parent');
              showEditModal(id, text, childName, parentId, parentNames[parentId] || parentId);
            });
          });

          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
              const id = this.getAttribute('data-id');
              if (confirm('Удалить это наблюдение?')) {
                try {
                  await db.collection('observations').doc(id).delete();
                  alert('✅ Удалено');
                  location.reload();
                } catch (err) {
                  alert('Ошибка: ' + err.message);
                }
              }
            });
          });

          // === ДОБАВЛЕНИЕ РЕБЁНКА ===
          document.getElementById('addChildForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const parentId = document.getElementById('parentId').value;
            const childName = document.getElementById('childName').value.trim();
            const childAge = parseInt(document.getElementById('childAge').value);

            if (!parentId || !childName || isNaN(childAge) || childAge < 3 || childAge > 12) {
              alert('Проверьте данные: возраст должен быть от 3 до 12 лет.');
              return;
            }

            try {
              const userRef = db.collection('users').doc(parentId);
              const userDoc = await userRef.get();
              if (!userDoc.exists) {
                alert('Пользователь не найден');
                return;
              }

              const userData = userDoc.data();
              const children = userData.children || [];
              const childId = Date.now().toString(); // уникальный ID

              children.push({ childId, childName, age: childAge });
              await userRef.update({ children });

              document.getElementById('addChildMessage').textContent = '✅ Ребёнок успешно добавлен!';
              document.getElementById('addChildForm').reset();
              document.getElementById('parentId').value = '';

              setTimeout(() => document.getElementById('addChildMessage').textContent = '', 3000);
            } catch (err) {
              console.error('Ошибка:', err);
              alert('Не удалось добавить ребёнка: ' + (err.message || 'ошибка'));
            }
          });

        } catch (err) {
          console.error('Ошибка:', err);
          adminContent.innerHTML = `<div class="card text-center"><p>Ошибка: ${err.message}</p></div>`;
        }
      });

      // === МОДАЛЬНЫЕ ОКНА ===
      function showCreateModal(parentNames) {
        let parentOptions = '';
        Object.entries(parentNames).forEach(([uid, name]) => {
          parentOptions += `<option value="${uid}">${name}</option>`;
        });

        const modalHTML = `
          <div id="createModal" style="display:block; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
            <div style="background:white; margin:40px auto; padding:2rem; max-width:600px; border-radius:12px;">
              <h3>Новое наблюдение</h3>
              <form id="createForm">
                <div class="form-group">
                  <label>Родитель *</label>
                  <select id="createParent" required>
                    <option value="">Выберите родителя</option>
                    ${parentOptions}
                  </select>
                </div>
                <div class="form-group">
                  <label>Ребёнок *</label>
                  <select id="createChild" required disabled>
                    <option value="">Сначала выберите родителя</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Текст наблюдения *</label>
                  <textarea id="createText" rows="5" required placeholder="Опишите поведение, реакции, рекомендации..."></textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="button">Создать</button>
                  <button type="button" class="secondary-button ml-2" onclick="closeModal('createModal')">Отмена</button>
                </div>
              </form>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);

        document.getElementById('createParent').addEventListener('change', async function() {
          const uid = this.value;
          const childSelect = document.getElementById('createChild');
          childSelect.innerHTML = '<option value="">Загрузка...</option>';
          childSelect.disabled = true;

          if (!uid) {
            childSelect.innerHTML = '<option value="">Сначала выберите родителя</option>';
            return;
          }

          try {
            const userDoc = await db.collection('users').doc(uid).get();
            const children = userDoc.exists && userDoc.data().children ? userDoc.data().children : [];
            childSelect.innerHTML = '';
            children.forEach(child => {
              const opt = document.createElement('option');
              opt.value = child.childId;
              opt.textContent = `${child.childName} (${child.age} лет)`;
              childSelect.appendChild(opt);
            });
            childSelect.disabled = children.length === 0;
          } catch (err) {
            childSelect.innerHTML = '<option value="">Ошибка загрузки</option>';
          }
        });

        document.getElementById('createForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const parentId = document.getElementById('createParent').value;
          const childId = document.getElementById('createChild').value;
          const childName = document.querySelector(`#createChild option[value="${childId}"]`)?.textContent || '—';
          const text = document.getElementById('createText').value.trim();

          if (!text || !parentId || !childId) return;

          try {
            await db.collection('observations').add({
              parentId: parentId,
              childId: childId,
              childName: childName,
              text: text,
              date: firebase.firestore.FieldValue.serverTimestamp(),
              author: 'Администратор',
              status: 'new'
            });
            alert('✅ Наблюдение создано!');
            closeModal('createModal');
            location.reload();
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        });
      }

      function showEditModal(id, currentText, childName, parentId, parentName) {
        const modalHTML = `
          <div id="editModal" style="display:block; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
            <div style="background:white; margin:40px auto; padding:2rem; max-width:600px; border-radius:12px;">
              <h3>Редактировать наблюдение</h3>
              <p><small>Ребёнок: ${childName}</small><br><small>Родитель: ${parentName}</small></p>
              <form id="editForm">
                <div class="form-group">
                  <label>Текст наблюдения *</label>
                  <textarea id="editText" rows="5" required>${currentText}</textarea>
                </div>
                <div class="form-actions">
                  <button type="submit" class="button">Сохранить</button>
                  <button type="button" class="secondary-button ml-2" onclick="closeModal('editModal')">Отмена</button>
                </div>
              </form>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);

        document.getElementById('editForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newText = document.getElementById('editText').value.trim();
          if (!newText) return;

          try {
            await db.collection('observations').doc(id).update({
              text: newText,
              date: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('✅ Обновлено!');
            closeModal('editModal');
            location.reload();
          } catch (err) {
            alert('Ошибка: ' + err.message);
          }
        });
      }

      window.closeModal = function(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.remove();
      };
    </script>

    <style>
      .small {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
        margin: 0;
        min-width: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      @media (max-width: 768px) {
        .card { font-size: 0.95rem; }
        .small { padding: 0.25rem 0.5rem; }
      }
    </style>
</body>
</html>
