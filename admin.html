<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Тихая поддержка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <custom-navbar></custom-navbar>
    <div class="nav-spacer"></div>

    <main class="container">
        <section class="hero">
            <h1>Админ-панель</h1>
            <p>Управление пользователями и отправка наблюдений</p>
        </section>

        <div id="adminContent">
            <div class="card text-center" style="padding: 3rem;">
                <h3>Загрузка...</h3>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
<script>
  // Инициализация Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDdaP1VyoidAjXmFERSKqldbSMsFIEXxSk",
    authDomain: "minde-31a83.firebaseapp.com",
    projectId: "minde-31a83",
    storageBucket: "minde-31a83.appspot.com",
    messagingSenderId: "1003108983817",
    appId: "1:1003108983817:web:494ede688023c73667c4d8"
  };
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(async (user) => {
    const adminContent = document.getElementById('adminContent');

    if (!user) {
      adminContent.innerHTML = `
        <div class="card text-center" style="padding: 3rem;">
          <h3>Войдите как администратор</h3>
          <a href="/login.html" class="button">Вход</a>
        </div>
      `;
      return;
    }

    try {
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists || userDoc.data().role !== 'admin') {
        adminContent.innerHTML = `
          <div class="card text-center" style="padding: 3rem;">
            <h3>Доступ запрещён</h3>
            <p>Только для администраторов</p>
            <a href="/" class="button">На главную</a>
          </div>
        `;
        return;
      }

      // Загружаем пользователей с детьми
      const usersSnapshot = await db.collection('users').get();
      const users = [];
      usersSnapshot.forEach(doc => {
        const data = doc.data();
        if (data.children && data.children.length > 0) {
          users.push({ ...data, uid: doc.id });
        }
      });

      if (users.length === 0) {
        adminContent.innerHTML = `
          <div class="card text-center" style="padding: 3rem;">
            <h3>Нет родителей с детьми</h3>
          </div>
        `;
        return;
      }

      // Рендерим таблицу
      let tableHtml = `
        <div class="card">
          <h3>👥 Родители с детьми (${users.length})</h3>
          <table class="w-100">
            <thead>
              <tr style="background:#f5f5f5;">
                <th>Имя</th>
                <th>Email</th>
                <th>Дети</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      `;
      adminContent.innerHTML = tableHtml;

      const tbody = document.getElementById('usersTableBody');
      users.forEach((u, index) => {
        const childrenList = u.children.map(c => `${c.childName} (${c.age} лет)`).join(', ');
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>${childrenList}</td>
          <td>
            <button class="button outline observation-btn" data-uid="${u.uid}" data-name="${u.name}" data-children='${JSON.stringify(u.children)}'>
              Отправить наблюдение
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });

      // Добавляем обработчики кнопок после рендеринга
      document.querySelectorAll('.observation-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const uid = this.getAttribute('data-uid');
          const name = this.getAttribute('data-name');
          const childrenJson = this.getAttribute('data-children');
          showObservationModal(uid, name, childrenJson);
        });
      });

      // Модальное окно (вставляем один раз)
      const modalHTML = `
        <div id="observationModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
          <div style="background:white; margin:50px auto; padding:2rem; max-width:600px; border-radius:12px;">
            <h3>Новое наблюдение для <span id="modalParentName"></span></h3>
            <form id="observationForm">
              <div class="form-group">
                <label>Ребёнок</label>
                <select id="observationChild" required>
                  <option value="">Выберите ребёнка</option>
                </select>
              </div>
              <div class="form-group">
                <label>Текст наблюдения *</label>
                <textarea id="observationText" rows="6" required placeholder="Опишите поведение, реакции, рекомендации..."></textarea>
              </div>
              <div class="form-actions">
                <button type="submit" class="button">Отправить</button>
                <button type="button" class="secondary-button ml-2" onclick="closeObservationModal()">Отмена</button>
              </div>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHTML);

      // Обработчик формы
      document.getElementById('observationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const parentId = document.getElementById('observationForm').dataset.parentId;
        const childId = document.getElementById('observationChild').value;
        const childName = document.querySelector(`#observationChild option[value="${childId}"]`).textContent;
        const text = document.getElementById('observationText').value.trim();

        if (!text) {
          alert('Пожалуйста, введите текст наблюдения.');
          return;
        }

        try {
          await db.collection('observations').add({
            parentId: parentId,
            childId: childId,
            childName: childName,
            text: text,
            date: firebase.firestore.FieldValue.serverTimestamp(),
            author: 'Администратор',
            status: 'new'
          });

          alert('✅ Наблюдение успешно отправлено!');
          closeObservationModal();
        } catch (err) {
          console.error('Ошибка:', err);
          alert('Ошибка: ' + (err.message || 'Не удалось отправить'));
        }
      });

    } catch (err) {
      console.error('Ошибка:', err);
      adminContent.innerHTML = `<div class="card text-center"><p>Ошибка: ${err.message}</p></div>`;
    }
  });

  // Функции модального окна
  window.showObservationModal = function(parentId, parentName, childrenJson) {
    const children = JSON.parse(childrenJson);
    const select = document.getElementById('observationChild');
    select.innerHTML = '<option value="">Выберите ребёнка</option>';
    children.forEach(child => {
      const opt = document.createElement('option');
      opt.value = child.childId;
      opt.textContent = `${child.childName} (${child.age} лет)`;
      select.appendChild(opt);
    });
    document.getElementById('modalParentName').textContent = parentName;
    document.getElementById('observationForm').dataset.parentId = parentId;
    document.getElementById('observationModal').style.display = 'block';
  };

  window.closeObservationModal = function() {
    document.getElementById('observationModal').style.display = 'none';
    document.getElementById('observationText').value = '';
  };
</script>
</body>
</html>
